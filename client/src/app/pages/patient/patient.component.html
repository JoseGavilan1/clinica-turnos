<div class="patient-container">
  <div class="form-card">
    <h2>Agendar Nuevo Turno</h2>
    <p>Complete sus datos para solicitar una hora de atención.</p>

    <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="patientName">Nombre Completo</label>
        <input type="text" id="patientName" formControlName="patientName" placeholder="Ej: Juan Pérez">
      </div>

      <div class="form-group">
        <label for="rut">RUT</label>
        <input type="text" id="rut" formControlName="rut" placeholder="Ej: 12.345.678-9">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="date">Fecha</label>
          <input type="date" id="date" formControlName="date">
        </div>

        <div class="form-group">
          <label for="time">Hora</label>
          <select id="time" formControlName="time">
            <option value="" disabled selected>Seleccione hora</option>
            <option value="09:00">09:00 AM</option>
            <option value="10:00">10:00 AM</option>
            <option value="11:00">11:00 AM</option>
            <option value="15:00">03:00 PM</option>
            <option value="16:00">04:00 PM</option>
          </select>
        </div>
      </div>

      <button type="submit" [disabled]="appointmentForm.invalid" class="submit-btn">
        Solicitar Turno
      </button>

    </form>
  </div>
</div>
